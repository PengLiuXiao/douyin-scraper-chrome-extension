<!DOCTYPE html>
<html>
  <head>
      <meta charset=utf-8>
      <title>DouyinURL提取Pro</title>
      <link rel="stylesheet" type="text/css" href="../../lib/bootstrap.min.css">
      <link rel="stylesheet" type="text/css" href="../../lib/handsontable.min.css">
      <link rel="stylesheet" type="text/css" href="popup.css">
  </head>
  <body>
      <div id="noResponseErr" class="alert alert-danger" style="margin: 10px;"></div>
	  <div id="wait">
          <h1 id="waitHeader">请稍候...</h1>
          <img src="../../assets/images/webrobots_logo.png" id="wait-spider"/>
      </div>
      <div id="content">
          <!-- Douyin Search Panel -->
          <div class="col-xs-12" id="douyinSearchPanel" style="display: none; margin-bottom: 15px; padding: 15px; border-radius: 8px; border: 1px solid #ddd; background-color: #f9f9f9;">
              <h4 style="margin-top: 0; color: #fe2c55; font-weight: bold; font-size: 15px;">
                  <span class="glyphicon glyphicon-search"></span> 抖音关键词视频提取
              </h4>
              <div class="input-group">
                  <input type="text" id="douyinSearchKeyword" class="form-control" placeholder="请输入搜索关键词（例如：美食、猫咪）" style="height: 38px;">
                  <span class="input-group-btn">
                      <button class="btn btn-danger" id="douyinSearchBtn" type="button" style="height: 38px; margin: 0; background-color: #fe2c55; border-color: #fe2c55; font-weight: bold; color: white;">
                          搜索并提取
                      </button>
                  </span>
              </div>

              <!-- 批量关键词导入 -->
              <div style="margin-top: 10px; display: flex; align-items: center; gap: 8px;">
                <button class="btn btn-default btn-sm" id="importKeywordsBtn" type="button" style="background:#fff3f5;border-color:#fe2c55;color:#fe2c55;font-weight:bold;">
                  <span class="glyphicon glyphicon-upload"></span> 批量导入关键词
                </button>
                <span style="color:#999;font-size:12px;">支持 CSV / XLSX 文件</span>
                <input type="file" id="keywordFileInput" accept=".csv,.xlsx" style="display:none;">
              </div>

              <!-- 批量搜索进度面板 -->
              <div id="batchProgressPanel" style="display:none; margin-top:12px; border:1px solid #f0c0c8; border-radius:8px; background:#fff9fa; padding:10px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                  <strong style="color:#fe2c55;font-size:13px;"><span class="glyphicon glyphicon-tasks"></span> 批量搜索进度</strong>
                  <div style="display:flex;gap:6px;">
                    <button class="btn btn-xs btn-warning" id="cancelBatchBtn" type="button">取消批量</button>
                    <button class="btn btn-xs btn-success" id="downloadMergedBtn" type="button" disabled style="opacity:0.5;"><span class="glyphicon glyphicon-download-alt"></span> 下载合并CSV</button>
                  </div>
                </div>
                <!-- 全局进度条 -->
                <div style="margin-bottom:8px;">
                  <div style="display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:3px;">
                    <span id="batchProgressLabel">0 / 0 关键词完成</span>
                    <span id="batchProgressPct">0%</span>
                  </div>
                  <div style="background:#f0d0d5;border-radius:4px;height:6px;overflow:hidden;">
                    <div id="batchProgressBar" style="width:0%;height:100%;background:linear-gradient(90deg,#fe2c55,#ff6b8a);border-radius:4px;transition:width 0.4s ease;"></div>
                  </div>
                </div>
                <!-- 关键词列表 -->
                <div id="keywordProgressList" style="max-height:200px;overflow-y:auto;"></div>
              </div>
          </div>

          <div class="col-xs-7 left-column">
              <button type="button" class="btn btn-primary btn-block" id='startScraping'>开始爬取</button>
              <button type="button" class="btn btn-default btn-block" id='stopScraping'>停止爬取</button>

              <form class="btn-block">
                  <div class="input-group btn-block">
                      <span class="input-group-addon">最短延迟(&ge;0)</span>
                      <input id='crawlDelay' type='number' value='1.5' class="form-control" />
                      <span class="input-group-addon">秒</span>
                  </div>
                  <div class="input-group btn-block">
                      <span class="input-group-addon">最长等待(&gt;延迟)</span>
                      <input id='maxWait' type='number' value='20' class="form-control" />
                      <span class="input-group-addon">秒</span>
                  </div>
                  <div class="input-group btn-block">
                      <span class="input-group-addon">时间上限(5-60)</span>
                      <input id='stopTimeLimit' type='number' value='15' min='5' max='60' class="form-control" />
                      <span class="input-group-addon">秒无新增停止</span>
                  </div>
                  <div class="input-group btn-block">
                      <span class="input-group-addon">连续无新增(1-10)</span>
                      <input id='stopScrollLimit' type='number' value='3' min='1' max='10' class="form-control" />
                      <span class="input-group-addon">次滚动后停止</span>
                  </div>
                  <div class="input-group btn-block">
                      <span class="input-group-addon">下载子目录</span>
                      <input id='downloadFolder' type='text' value='douyin-url-extractor' class="form-control" placeholder="默认: douyin-url-extractor" />
                  </div>
             </form>
          </div>
          <div class="col-xs-5 right-column">
              <button type="button" class="btn btn-success download-button btn-block" id='csv'><span class="glyphicon glyphicon-download-alt"></span> CSV</button><br>
              <button type="button" class="btn btn-success download-button btn-block" id='xlsx'><span class="glyphicon glyphicon-download-alt"></span> XLSX</button>
			  <button type="button" class="btn btn-success download-button btn-block" id='copy'><span class="glyphicon glyphicon-copy"></span> 复制全部</button>
              
              <div id="stats">
                  <div>已采集页数：0</div>
                  <div>收集视频数：0</div>
                  <div>本次新增：0</div>
                  <div>已运行：0s</div>
              </div>
              
              <button type="button" class="btn btn-warning btn-block" id='resetColumns'>重置列</button>
          </div>
          <div class="col-xs-12" id="info">
               <div class="alert alert-danger" id="error"></div>
               <div class="alert alert-warning" id="inputError"></div>
               <div class="alert alert-warning" id="finished"></div>
               <div class="alert alert-warning" id="previewLimit"></div>
               <div class="alert alert-info" id="instructions"></div>
          </div>
          <div class="col-xs-12">
              <div id="hot" class="hot handsontable htRowHeaders htColumnHeaders"></div>
          </div>
      </div>
      <script src="../../lib/papaparse.min.js"></script>
      <script src="../../lib/jquery-3.1.1.min.js"></script>
      <script src="../../lib/handsontable.min.js"></script>

      <script src="../../lib/xlsx.full.min.js"></script>

      <script src="popup.js"></script>
  </body>

</html>
